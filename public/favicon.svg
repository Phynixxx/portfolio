<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="yd-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0d0d1a"/>

  <!-- Gradient border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="url(#border-grad)" stroke-width="2"/>

  <!-- YD text with gradient -->
  <text
    x="50"
    y="68"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="48"
    font-weight="900"
    fill="url(#yd-grad)"
    text-anchor="middle"
    letter-spacing="-2"
  >YD</text>
</svg>
